name: Update Omnistrate Plan
description: "Update an Omnistrate plan with a new compose file"

inputs:
  username:
    description: "The username to use for authentication (unused, kept for compatibility)"
    required: false
  password:
    description: "The API key to use for authentication"
    required: true
  file:
    description: "The file to update the plan with"
    required: true
  service-name:
    description: "The name of the service to update"
    required: true
  environment:
    description: "The environment to update the plan with"
    required: true
  environment-type:
    description: "The type of environment to update the plan with"
    required: true
  release-description:
    description: "The description of the release"
    required: false

runs:
  using: docker
  image: ghcr.io/omnistrate/ctl:0.11.3
  entrypoint: /bin/sh
  args:
    - -c
    - "echo '${{ inputs.password }}' | /usr/local/bin/omnistrate-ctl login --api-key-stdin && /usr/local/bin/omnistrate-ctl build -f /github/workspace/${{ inputs.file }} -n '${{ inputs.service-name }}' --environment '${{ inputs.environment }}' --environment-type '${{ inputs.environment-type }}' --release-as-preferred --release-description '${{ inputs.release-description }}'"