name: Create Omnistrate Custom Network
description: "Create a custom network in Omnistrate"

inputs:
  username:
    description: "The username to use for authentication (legacy, prefer api-key)"
    required: false
  password:
    description: "The password to use for authentication (legacy, prefer api-key)"
    required: false
  api-key:
    description: "Omnistrate API key for authentication"
    required: false
  cloud_provider:
    description: "The cloud provider to use for the custom network"
    required: true
  region:
    description: "The region to use for the custom network"
    required: true
  cidr:
    description: "The CIDR to use for the custom network"
    required: true
  name:
    description: "The name to use for the custom network"
    required: true

runs:
  using: docker
  image: ghcr.io/omnistrate/ctl:0.11.3
  entrypoint: /bin/sh
  args:
    - -c
    - |
      if [ -n "${{ inputs.api-key }}" ]; then
        /usr/local/bin/omnistrate-ctl login --email "apikey@apikeys.invalid" --password "${{ inputs.api-key }}"
      else
        /usr/local/bin/omnistrate-ctl login --email ${{ inputs.username }} --password ${{ inputs.password }}
      fi && /usr/local/bin/omnistrate-ctl custom-network list -o json | grep -q '${{ inputs.name }}' || /usr/local/bin/omnistrate-ctl custom-network create --cloud-provider ${{ inputs.cloud_provider }} --region ${{ inputs.region }} --cidr ${{ inputs.cidr }} --name '${{ inputs.name }}'
