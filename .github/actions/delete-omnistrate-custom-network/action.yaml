name: Delete Omnistrate Custom Network
description: "Delete a custom network in Omnistrate"

inputs:
  username:
    description: "The username to use for authentication (legacy, prefer api-key)"
    required: false
  password:
    description: "The password to use for authentication (legacy, prefer api-key)"
    required: false
  api-key:
    description: "Omnistrate API key for authentication"
    required: false
  custom_network_name:
    description: "The name of the custom network"

runs:
  using: docker
  image: ghcr.io/omnistrate/ctl:0.11.3
  entrypoint: /bin/sh
  args:
    - -c
    - |
      if [ -n "${{ inputs.api-key }}" ]; then
        echo "${{ inputs.api-key }}" | /usr/local/bin/omnistrate-ctl login --api-key-stdin
      else
        /usr/local/bin/omnistrate-ctl login --email ${{ inputs.username }} --password ${{ inputs.password }}
      fi && /usr/local/bin/omnistrate-ctl custom-network delete ${{ inputs.custom_network_name }}
