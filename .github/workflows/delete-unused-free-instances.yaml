name: Delete unused free tier instances

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC

jobs:
  delete-unused-free-instances:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login and delete unused stopped free tier instances
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            -e OMNISTRATE_USERNAME='${{ secrets.OMNISTRATE_API_KEY_USERNAME}}' \
            -e OMNISTRATE_PASSWORD='${{ secrets.OMNISTRATE_API_KEY }}' \
            -e OMNISTRATE_INTERNAL_SERVICE_ID='s-KgFDwg5vBS' \
            -e OMNISTRATE_INTERNAL_PROD_ENVIRONMENT='se-1iyXYFtYfA' \
            -v ${{ github.workspace }}/scripts:/scripts:ro \
            ghcr.io/omnistrate-oss/omnistrate-ctl:1.8.5 \
            -c "
              apk add jq && \
              echo \"$OMNISTRATE_PASSWORD\" | /usr/local/bin/omnistrate-ctl login --api-key-stdin && \
              /bin/sh /scripts/delete-unused-stopped-free-instances.sh
            "
