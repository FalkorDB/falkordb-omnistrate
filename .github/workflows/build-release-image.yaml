name: Build and release image

on:
  workflow_run:
    workflows: ["Build and test image"]
    types:
      - completed
    branches: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.2.3)'
        required: true
        type: string

concurrency:
  group: falkordb-node-release
  cancel-in-progress: true

env:
  NODE_IMAGE_NAME: falkordb-node
  CLUSTER_IMAGE_NAME: falkordb-cluster
  CLUSTER_REBALANCE_IMAGE_NAME: falkordb-cluster-rebalance
  HEALTHCHECK_IMAGE_NAME: falkordb-cloud-healthcheck
  FALKORDB_EXPORTER_IMAGE_NAME: falkordb-cloud-exporter
  FALKORDB_SENTINEL_IMAGE_NAME: falkordb-cloud-sentinel
  FALKORDB_VERSION: v4.18.10
  OOM_GUARD_IMAGE_NAME: falkordb-cloud-oom-guard
  
jobs:
  build-rust-binaries:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: rust:1-slim-bullseye
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Install build dependencies
        run: |
          apt-get update -y
          apt-get install -y pkg-config build-essential cmake libtool openssl libssl-dev gcc-aarch64-linux-gnu

      - name: Add ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src/healthcheck_rs -> target
            src/oom-guard -> target
          shared-key: "rust-binaries-release"
          cache-on-failure: "true"

      - name: Build healthcheck for x86_64
        working-directory: src/healthcheck_rs
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Build healthcheck for aarch64
        working-directory: src/healthcheck_rs
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Build oom-guard for x86_64
        working-directory: src/oom-guard
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Build oom-guard for aarch64
        working-directory: src/oom-guard
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Prepare binaries
        run: |
          mkdir -p src/healthcheck_rs/bin
          cp src/healthcheck_rs/target/x86_64-unknown-linux-gnu/release/healthcheck src/healthcheck_rs/bin/healthcheck-amd64
          cp src/healthcheck_rs/target/aarch64-unknown-linux-gnu/release/healthcheck src/healthcheck_rs/bin/healthcheck-arm64
          mkdir -p src/oom-guard/bin
          cp src/oom-guard/target/x86_64-unknown-linux-gnu/release/oom-guard src/oom-guard/bin/oom-guard-amd64
          cp src/oom-guard/target/aarch64-unknown-linux-gnu/release/oom-guard src/oom-guard/bin/oom-guard-arm64

      - name: Upload healthcheck binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: healthcheck-binaries
          path: src/healthcheck_rs/bin/

      - name: Upload oom-guard binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oom-guard-binaries
          path: src/oom-guard/bin/

  build-and-push:
    needs: build-rust-binaries
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
        image:
          - dockerfile: ./src/falkordb-node/Dockerfile
            image_name: falkordb-node
          - dockerfile: ./src/falkordb-cluster/Dockerfile
            image_name: falkordb-cluster
          - dockerfile: ./src/falkordb-cluster-rebalance/Dockerfile
            image_name: falkordb-cluster-rebalance
          - dockerfile: ./src/healthcheck_rs/Dockerfile
            image_name: falkordb-cloud-healthcheck
          - dockerfile: ./src/falkordb-exporter/Dockerfile
            image_name: falkordb-cloud-exporter
          - dockerfile: ./src/falkordb-sentinel/Dockerfile
            image_name: falkordb-cloud-sentinel
          - dockerfile: ./src/oom-guard/Dockerfile
            image_name: falkordb-cloud-oom-guard
    steps:
      - run: ${{ tojson(github.event) }}
        shell: cat {0}
      
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set release tag
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}-${{ matrix.platform }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}-${{ matrix.platform }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download healthcheck binaries
        if: matrix.image.image_name == 'falkordb-cloud-healthcheck'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: healthcheck-binaries
          path: src/healthcheck_rs/bin/

      - name: Download oom-guard binaries
        if: matrix.image.image_name == 'falkordb-cloud-oom-guard'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oom-guard-binaries
          path: src/oom-guard/bin/

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          build-args: FALKORDB_VERSION=${{ env.FALKORDB_VERSION }}
          platforms: linux/${{ matrix.platform }}
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image.image_name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.image_name }}-${{ matrix.platform }}
          tags: falkordb/${{ matrix.image.image_name }}:${{ steps.set_tag.outputs.tag }}, falkordb/${{ matrix.image.image_name }}:latest-${{ matrix.platform }}

      - name: Scan image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v6
        id: grype
        with:
          image: falkordb/${{ matrix.image.image_name }}:${{ steps.set_tag.outputs.tag }}
          registry-username: ${{ secrets.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          only-fixed: true
          config: .github/grype.yaml

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.image.image_name }}-${{ matrix.platform }}

  create-image-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set release tag
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push manifest lists
        run: |
          images=("${{env.NODE_IMAGE_NAME}}" "${{env.CLUSTER_IMAGE_NAME}}" "${{env.CLUSTER_REBALANCE_IMAGE_NAME}}" "${{env.HEALTHCHECK_IMAGE_NAME}}" "${{env.FALKORDB_EXPORTER_IMAGE_NAME}}" "${{env.FALKORDB_SENTINEL_IMAGE_NAME}}" "${{env.OOM_GUARD_IMAGE_NAME}}")
          for image in "${images[@]}"; do
            docker buildx imagetools create \
              --tag falkordb/$image:${{ steps.set_tag.outputs.tag }} \
              falkordb/$image:${{ steps.set_tag.outputs.tag }}-amd64 \
              falkordb/$image:${{ steps.set_tag.outputs.tag }}-arm64
          done
  
  omnistrate-update-plans:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        plans:
          - name: FalkorDB
            file: omnistrate.free.yaml
            key: free
          - name: FalkorDB
            file: omnistrate.pro.yaml
            key: pro
          - name: FalkorDB
            file: omnistrate.enterprise.yaml
            key: enterprise
          - name: FalkorDB
            file: omnistrate.startup.yaml
            key: startup
          - name: FalkorDB
            file: omnistrate.enterprise.byoa.yaml
            key: enterprise-byoa
    steps:
      - name: Checkout
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set release tag
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Replace Variables
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        working-directory: compose
        run: |
          sed -i 's/$GcpProjectId/${{ vars.GCP_PROJECT_ID }}/g' ${{ matrix.plans.file }}
          sed -i 's/$GcpProjectNumber/${{ vars.GCP_PROJECT_NUMBER }}/g' ${{ matrix.plans.file }}
          sed -i 's/$GcpServiceAccountEmail/${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}/g' ${{ matrix.plans.file }}
          sed -i 's/$AwsAccountId/${{ vars.AWS_ACCOUNT_ID }}/g' ${{ matrix.plans.file }}
          sed -i 's|$AwsBootstrapRoleAccountArn|${{ vars.AWS_BOOTSTRAP_ROLE_ACCOUNT_ARN }}|g' ${{ matrix.plans.file }}
          sed -i 's/$AzureSubscriptionId/${{ vars.AZURE_SUBSCRIPTION_ID }}/g' ${{ matrix.plans.file }}
          sed -i 's/$AzureTenantId/${{ vars.AZURE_TENANT_ID }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBNodeImage/falkordb\/${{ env.NODE_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBClusterImage/falkordb\/${{ env.CLUSTER_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBClusterRebalanceImage/falkordb\/${{ env.CLUSTER_REBALANCE_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBHealthcheckImage/falkordb\/${{ env.HEALTHCHECK_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBExporterImage/falkordb\/${{ env.FALKORDB_EXPORTER_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$FalkorDBSentinelImage/falkordb\/${{ env.FALKORDB_SENTINEL_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$OomGuardImage/falkordb\/${{ env.OOM_GUARD_IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}/g' ${{ matrix.plans.file }}
          sed -i 's/$MeteringBucketName/${{ secrets.METERING_BUCKET_NAME }}/g' ${{ matrix.plans.file }}

      - name: Remove e2-machine from pro and enterprise
        if: ${{ contains( vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) && (matrix.plans.key == 'pro' || matrix.plans.key == 'enterprise') }}
        working-directory: compose
        run: |
          sed -i 's/"GCP 2vCPU, 4GB": "e2-medium"//g' ${{ matrix.plans.file }}
          sed -i 's/"AWS 2vCPU, 4GB": "t2.medium"//g' ${{ matrix.plans.file }}
      - name: Enable snapshotBeforeDeletion
        if: ${{ contains( vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) && (matrix.plans.key != 'free')}}
        working-directory: compose
        run: |
          sed -i 's/snapshotBeforeDeletion: false/snapshotBeforeDeletion: true/g' ${{ matrix.plans.file }}
          
      - name: Upload yaml to artifacts
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.plans.file }}
          path: compose/${{ matrix.plans.file }}

      - name: Create FALKORDB_PASSWORD/ADMIN_PASSWORD files
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        run: |
          export sec=$(grep '^secrets' compose/omnistrate.free.yaml)
          if [[ -n "$sec" ]];then
            mkdir -p secrets || { echo "Failed to create secrets directory"; exit 1; }
            echo '{{ $var.falkordbPassword }}' > ./secrets/falkordbpassword || { echo "Failed to write falkordbpassword"; exit 1; }
            echo '{{ $func.random(string, 16, $sys.deterministicSeedValue) }}' > ./secrets/adminpassword || { echo "Failed to write adminpassword"; exit 1; }
          else
            echo "secrets option was not used"
            exit 0
          fi

      - name: Update Omnistrate plan
        if: ${{ contains(vars.OMNISTRATE_RELEASE_PLANS, matrix.plans.key) }}
        uses: ./.github/actions/update-omnistrate-plan
        with:
          username: ${{ secrets.OMNISTRATE_API_KEY_USERNAME}}
          password: ${{ secrets.OMNISTRATE_API_KEY }}
          file: compose/${{ matrix.plans.file }}
          service-name: ${{ matrix.plans.name }}
          environment: dev
          environment-type: dev
          release-description: "${{ steps.set_tag.outputs.tag }}-${{ env.FALKORDB_VERSION}}"
